<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <title>Who's With Who?</title>
    <!-- Same OG tags as index.html — GitHub Pages serves this for deep links (SPA fallback).
         Crawlers (iMessage, Messenger) do not run JS, so per-game meta cannot be dynamic here. -->
    <meta name="description" content="Guess the couples — one try per game." />
    <meta property="og:title" content="Who's With Who?" />
    <meta property="og:description" content="Guess the couples — one try per game." />
    <meta property="og:image" content="https://ryazlee.github.io/whos-with-who/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://ryazlee.github.io/whos-with-who/" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Who's With Who?" />
    <meta name="twitter:description" content="Guess the couples — one try per game." />
    <meta name="twitter:image" content="https://ryazlee.github.io/whos-with-who/og-image.png" />
    <script>
      // GitHub Pages SPA fallback — https://github.com/rafgraph/spa-github-pages
      // Project site: keep /whos-with-who in the path after redirect.
      var pathSegmentsToKeep = 1

      var l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + pathSegmentsToKeep)
            .join('/') +
          '/?/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(pathSegmentsToKeep)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      )
    </script>
  </head>
  <body></body>
</html>
